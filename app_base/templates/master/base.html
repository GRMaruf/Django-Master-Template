<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <style>
      :root {
        --ink: #16213e;
        --muted: #667085;
        --paper: #ffffff;
        --soft: #f6f8fb;
        --line: #dde5ee;
        --brand: #178a82;
        --brand-dark: #1b3634;
        --accent: #d97706;
        --shadow: 0 18px 55px rgba(22, 33, 62, 0.11);
      }
      
      html {
        scroll-behavior: smooth;
      }
      
      body {
        background: radial-gradient(circle at 10% 5%, rgba(15, 118, 110, 0.12), transparent 30%), linear-gradient(180deg, #fbfcfe 0%, #eef3f8 100%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
      }
      
      a {
        color: var(--brand);
      }
      
      a:hover {
        color: var(--brand-dark);
      }
      
      img {
        max-width: 100%;
      }
      
      .site-shell {
        min-height: calc(100vh - 156px);
        padding: 8px;
      }
      
      .site-nav {
        background: rgba(255, 255, 255, 0.86) !important;
        backdrop-filter: blur(18px);
        border-bottom: 1px solid rgba(221, 229, 238, 0.8);
      }
      
      .navbar-brand {
        color: var(--ink) !important;
        letter-spacing: 0;
      }
      
      .site-nav .nav-link {
        border-radius: 8px;
        color: #344054 !important;
        font-weight: 650;
        padding: 0.55rem 0.8rem;
        transition: background 0.2s ease, color 0.2s ease;
      }
      
      .site-nav .nav-link:hover,
      .site-nav .nav-link.active {
        background: #e7f6f3;
        color: var(--brand-dark) !important;
      }

      .nav-toggle {
        align-items: center;
        display: inline-flex;
        flex-direction: column;
        gap: 5px;
        height: 42px;
        justify-content: center;
        padding: 0;
        width: 42px;
      }

      .nav-toggle span {
        background: var(--ink);
        border-radius: 999px;
        display: block;
        height: 2px;
        transition: transform 0.22s ease, opacity 0.18s ease, width 0.22s ease;
        width: 24px;
      }

      .nav-toggle span:nth-child(2) {
        width: 18px;
      }

      .nav-toggle.is-open span:first-child {
        transform: translateY(7px) rotate(45deg);
      }

      .nav-toggle.is-open span:nth-child(2) {
        opacity: 0;
        width: 0;
      }

      .nav-toggle.is-open span:last-child {
        transform: translateY(-7px) rotate(-45deg);
      }

      .nav-cta {
        padding: 0.55rem 1rem;
      }
      
      .btn {
        border-radius: 8px;
        font-weight: 700;
      }
      
      .btn-primary,
      .btn-brand {
        background: var(--brand);
        border-color: var(--brand);
        box-shadow: 0 12px 24px rgba(15, 118, 110, 0.18);
        color: #fff;
      }
      
      .btn-primary:hover,
      .btn-brand:hover {
        background: var(--brand-dark);
        border-color: var(--brand-dark);
        color: #fff;
      }
      
      .btn-outline-primary,
      .btn-outline-brand {
        border-color: var(--brand);
        color: var(--brand);
      }
      
      .btn-outline-primary:hover,
      .btn-outline-brand:hover {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }
      
      .eyebrow {
        color: var(--brand);
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      
      .section-pad {
        padding: 72px 0;
      }
      
      .section-title {
        font-size: clamp(2rem, 4vw, 3.25rem);
        font-weight: 850;
        letter-spacing: 0;
        line-height: 1.02;
      }
      
      .section-copy {
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.8;
      }
      
      .surface {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(221, 229, 238, 0.9);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }
      
      .soft-panel {
        background: rgba(246, 248, 251, 0.86);
        border: 1px solid rgba(221, 229, 238, 0.85);
        border-radius: 8px;
      }
      
      .lift {
        transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
      }
      
      .lift:hover {
        border-color: rgba(15, 118, 110, 0.32);
        box-shadow: 0 24px 70px rgba(22, 33, 62, 0.16);
        transform: translateY(-5px);
      }
      
      .tag-pill {
        align-items: center;
        background: #e7f6f3;
        border: 1px solid #cbe8e2;
        border-radius: 999px;
        color: #115e59;
        display: inline-flex;
        font-size: 0.83rem;
        font-weight: 750;
        line-height: 1;
        min-height: 32px;
        padding: 0 12px;
      }
      
      .muted {
        color: var(--muted);
      }
      
      .reveal {
        animation: riseIn 0.7s ease both;
      }
      
      .reveal-delay-1 {
        animation-delay: 0.08s;
      }
      
      .reveal-delay-2 {
        animation-delay: 0.16s;
      }
      
      .reveal-delay-3 {
        animation-delay: 0.24s;
      }
      
      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
      
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .sidebar-header {
        background: var(--brand);
      }

      .sidebar-link {
        border-radius: 8px;
        color: #344054;
        display: block;
        font-weight: 700;
        margin-bottom: 5px;
        padding: 12px 14px;
        text-decoration: none;
        transition: background 0.2s ease, color 0.2s ease;
      }
      
      .sidebar-link:hover {
        background: #e7f6f3;
        color: var(--brand);
      }
      
      .sidebar-link.active {
        background: var(--brand);
        color: #fff;
      }
      
      .offcanvas {
        width: 280px;
      }
      
      .offcanvas-body {
        background: #fff;
      }
      
      @media (max-width: 767.98px) {
        .section-pad {
          padding: 44px 0;
        }
      
        .section-title {
          font-size: 2.15rem;
        }
      }
      
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          scroll-behavior: auto !important;
          transition-duration: 0.001ms !important;
        }
      }
      
      @media print {
        .navbar,
        .footer,
        .no-print {
          display: none !important;
        }
      
        body {
          background: #fff !important;
          color: #111 !important;
          font-size: 11pt;
        }
      
        .site-shell,
        .section-pad {
          min-height: auto;
          padding: 0 !important;
        }
      
        .container {
          max-width: none !important;
          width: 100% !important;
        }
      
        .surface,
        .soft-panel {
          background: #fff !important;
          border: 0 !important;
          box-shadow: none !important;
        }
      }
      
      .footer {
        border-top: 1px solid rgba(221, 229, 238, 0.9);
        color: var(--muted);
      }
    </style>
    {% block css %}

    {% endblock %}
    <title>
      {% block title %}

      {% endblock %}
    </title>
  </head>
  <body>
    {% include 'master/nav.html' %}
    <main class="site-shell">
      {% block content %}

      {% endblock %}
    </main>
    {% include 'master/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script>
      const navToggle = document.getElementById('navToggle')
      const sidebar = document.getElementById('sidebar')

      if (navToggle && sidebar) {
        sidebar.addEventListener('show.bs.offcanvas', () => navToggle.classList.add('is-open'))
        sidebar.addEventListener('hidden.bs.offcanvas', () => navToggle.classList.remove('is-open'))
      }
    </script>
  </body>
</html>
