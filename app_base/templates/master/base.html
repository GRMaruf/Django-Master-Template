<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <style>
      :root {
        --ink: #16213e;
        --muted: #667085;
        --brand: #178a82;
        --brand-dark: #1b3634;
        --brand-soft: #e7f6f3;
        --paper: #ffffff;
        --surface: #f8fafc;
        --line: rgba(221, 229, 238, 0.9);
        --danger: #dc2626;
        --success: #16a34a;
        --warning: #d97706;
      }
      
      html {
        scroll-behavior: smooth;
      }
      body {
        min-height: 100vh;
        color: var(--ink);
        background: radial-gradient(circle at 10% 5%, rgba(15, 118, 110, 0.12), transparent 30%), linear-gradient(180deg, var(--paper) 0%, var(--surface) 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      a {
        color: var(--brand);
      }
      a:hover {
        color: var(--brand-dark);
      }
      
      .site-shell {
        min-height: calc(100vh - 156px);
        padding: 8px;
      }
      .site-nav {
        background: rgba(255, 255, 255, 0.86) !important;
        backdrop-filter: blur(18px);
        border-bottom: 1px solid var(--line);
      }
      .navbar-brand {
        color: var(--ink) !important;
        letter-spacing: 0;
      }
      
      .site-nav .nav-link,
      .sidebar-link {
        border-radius: 8px;
        color: #344054 !important;
        font-weight: 700;
        transition: background 0.2s ease, color 0.2s ease;
      }
      .site-nav .nav-link {
        padding: 0.55rem 0.8rem;
      }
      .sidebar-link {
        display: block;
        margin-bottom: 5px;
        padding: 12px 14px;
        text-decoration: none;
      }
      .site-nav .nav-link:hover,
      .site-nav .nav-link.active,
      .sidebar-link:hover {
        background: var(--brand-soft);
        color: var(--brand-dark) !important;
      }
      .sidebar-link.active,
      .sidebar-header {
        background: var(--brand);
        color: #fff !important;
      }
      
      .nav-toggle {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
        width: 42px;
        height: 42px;
        padding: 0;
      }
      .nav-toggle span {
        width: 24px;
        height: 2px;
        display: block;
        background: var(--ink);
        border-radius: 999px;
        transition: transform 0.22s ease, opacity 0.18s ease, width 0.22s ease;
      }
      .nav-toggle span:nth-child(2) {
        width: 18px;
      }
      .nav-toggle.is-open span:first-child {
        transform: translateY(7px) rotate(45deg);
      }
      .nav-toggle.is-open span:nth-child(2) {
        width: 0;
        opacity: 0;
      }
      .nav-toggle.is-open span:last-child {
        transform: translateY(-7px) rotate(-45deg);
      }
      
      .btn {
        border-radius: 8px;
        font-weight: 700;
      }
      .nav-cta,
      .btn-brand {
        padding: 0.55rem 1rem;
      }
      .btn-brand {
        color: #fff;
        background: var(--brand);
        border-color: var(--brand);
        box-shadow: 0 12px 24px rgba(15, 118, 110, 0.18);
      }
      .btn-brand:hover {
        color: #fff;
        background: var(--brand-dark);
        border-color: var(--brand-dark);
      }
      
      .offcanvas {
        width: 280px;
      }
      .offcanvas-body {
        background: var(--paper);
      }
      .footer {
        color: var(--muted);
        border-top: 1px solid var(--line);
      }
      
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.001ms !important;
        }
      }
      @media print {
        .navbar,
        .footer,
        .no-print {
          display: none !important;
        }
        body {
          color: #111 !important;
          background: var(--paper) !important;
          font-size: 11pt;
        }
        .site-shell {
          min-height: auto;
          padding: 0 !important;
        }
        .container {
          width: 100% !important;
          max-width: none !important;
        }
      }
    </style>
    {% block css %}

    {% endblock %}
    <title>
      {% block title %}

      {% endblock %}
    </title>
  </head>
  <body>
    {% include 'master/nav.html' %}
    <main class="site-shell">
      {% block content %}

      {% endblock %}
    </main>
    {% include 'master/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script>
      const navToggle = document.getElementById('navToggle')
      const sidebar = document.getElementById('sidebar')
      
      if (navToggle && sidebar) {
        sidebar.addEventListener('show.bs.offcanvas', () => navToggle.classList.add('is-open'))
        sidebar.addEventListener('hidden.bs.offcanvas', () => navToggle.classList.remove('is-open'))
      }
    </script>
  </body>
</html>
